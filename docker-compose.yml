services:
  aifeed:
    build: .
    container_name: aifeed
    restart: unless-stopped
    volumes:
      - aifeed_data:/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - SITE_URL=${SITE_URL:-https://deeptrendlab.com}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - webproxy

networks:
  webproxy:
    external: true

volumes:
  aifeed_data:
    driver: local
