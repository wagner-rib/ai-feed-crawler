version: "3.9"

services:
  aifeed:
    build: .
    container_name: aifeed
    restart: unless-stopped
    ports:
      - "8080:5000"
    volumes:
      - aifeed_data:/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  aifeed_data:
    driver: local
